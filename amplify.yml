version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        # Amplify 호스팅 환경 변수를 Next.js API/SSR에서 사용하려면
        # 빌드 전에 .env.production 에 써야 합니다.
        - env | grep -e MONGODB_URI >> .env.production || true
        - env | grep -e AUTH_SECRET >> .env.production || true
        - env | grep -e NEXT_PUBLIC_ >> .env.production || true
        # 토스페이먼츠 시크릿(NEXT_PUBLIC_ 접두사 없음) — 포인트 충전 승인 API에 필요
        - env | grep -e TOSS_ >> .env.production || true
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
